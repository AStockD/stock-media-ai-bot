version: '3.8'

services:
  backend:
    build: ./backend
    container_name: smab-backend
    ports:
      - "8002:8000"
    environment:
      - TZ=Asia/Shanghai
      - DB_HOST=${DB_HOST:-mysql8}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-smab}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-smab}
      - JWT_SECRET=${JWT_SECRET}
      - ASTOCKD_POSTER_API_TOKEN=${ASTOCKD_POSTER_API_TOKEN}
      - LLM_API_KEY=${LLM_API_KEY}
      - STOCK_ANALYZE_URL=${STOCK_ANALYZE_URL}
      - STOCK_ANALYZE_BEARER_TOKEN=${STOCK_ANALYZE_BEARER_TOKEN}
    volumes:
      - ./backend/data:/app/data
    networks:
      - smab
      - mysql_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: smab-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - smab
    restart: unless-stopped

networks:
  smab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
          gateway: 172.29.0.1
  mysql_net:
    external: true
    name: mysql_mysql-network
